<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="GoSpooky x Resolve IT">
  <defs>
    <linearGradient id="gs-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E2B23"/>
      <stop offset="1" stop-color="#2C3E4A"/>
    </linearGradient>
    <linearGradient id="gs-acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6DB757"/>
      <stop offset="1" stop-color="#3E8E41"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#gs-bg)"/>
  <circle cx="710" cy="70" r="170" fill="#6DB757" opacity="0.08"/>
  <circle cx="90" cy="450" r="140" fill="#6DB757" opacity="0.08"/>
  <!-- Sales (Salesforce) card -->
  <g>
    <rect x="120" y="150" width="220" height="180" rx="18" fill="#ffffff" opacity="0.96"/>
    <path d="M148 185h164M148 213h164M148 241h110" stroke="#3E8E41" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <rect x="148" y="272" width="90" height="26" rx="13" fill="url(#gs-acc)"/>
    <text x="230" y="365" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff" opacity="0.85">Sales in Salesforce</text>
  </g>
  <!-- Two-way sync -->
  <g stroke="url(#gs-acc)" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M370 215h90l-16-16"/>
    <path d="M460 265h-90l16 16"/>
  </g>
  <!-- Projects card -->
  <g>
    <rect x="490" y="150" width="220" height="180" rx="18" fill="#ffffff" opacity="0.96"/>
    <rect x="516" y="182" width="52" height="52" rx="10" fill="url(#gs-acc)" opacity="0.9"/>
    <rect x="584" y="182" width="52" height="52" rx="10" fill="#1E2B23" opacity="0.25"/>
    <rect x="652" y="182" width="32" height="52" rx="10" fill="#1E2B23" opacity="0.15"/>
    <path d="M516 262h168M516 288h120" stroke="#1E2B23" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
    <text x="600" y="365" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff" opacity="0.85">Projecten &amp; budgetten</text>
  </g>
  <text x="400" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">GoSpooky · Sales gekoppeld aan projecten</text>
</svg>
