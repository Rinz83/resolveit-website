      <stop offset="0" stop-color="#1E2B23"/>
      <stop offset="1" stop-color="#2E4A44"/>
    </linearGradient>
    <linearGradient id="mb-acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6DB757"/>
      <stop offset="1" stop-color="#3E8E41"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#mb-bg)"/>
  <circle cx="710" cy="70" r="170" fill="#6DB757" opacity="0.08"/>
  <circle cx="90" cy="450" r="140" fill="#6DB757" opacity="0.08"/>
  <!-- Magazines stack -->
  <g>
    <rect x="112" y="175" width="140" height="165" rx="10" fill="#ffffff" opacity="0.6" transform="rotate(-7 182 257)"/>
    <rect x="132" y="165" width="140" height="170" rx="10" fill="#ffffff" opacity="0.96"/>
    <rect x="148" y="182" width="108" height="56" rx="6" fill="url(#mb-acc)" opacity="0.85"/>
    <path d="M148 258h108M148 280h108M148 302h70" stroke="#1E2B23" stroke-width="7" stroke-linecap="round" opacity="0.3"/>
    <text x="200" y="372" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff" opacity="0.85">Titels &amp; kanalen</text>
  </g>
  <!-- Sync arrow -->
