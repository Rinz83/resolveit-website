    <circle cx="628" cy="290" r="24" fill="url(#mb-acc)"/>
    <text x="628" y="299" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">€</text>
    <text x="570" y="372" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff" opacity="0.85">Automatische facturatie</text>
  </g>
  <text x="400" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">MYbusinessmedia · Eén klantbeeld, één factuurstroom</text>
