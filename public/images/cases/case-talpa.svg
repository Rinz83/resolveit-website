<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Talpa Studios x Resolve IT">
  <defs>
    <linearGradient id="tp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E2B23"/>
      <stop offset="1" stop-color="#2A3A4A"/>
    </linearGradient>
    <linearGradient id="tp-acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6DB757"/>
      <stop offset="1" stop-color="#3E8E41"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#tp-bg)"/>
  <circle cx="710" cy="70" r="170" fill="#6DB757" opacity="0.08"/>
  <circle cx="90" cy="450" r="140" fill="#6DB757" opacity="0.08"/>
  <!-- TV screen with play button -->
  <g>
    <rect x="110" y="150" width="240" height="160" rx="18" fill="#ffffff" opacity="0.96"/>
    <rect x="128" y="168" width="204" height="110" rx="10" fill="#1E2B23" opacity="0.85"/>
    <path d="M215 200l40 23-40 23z" fill="url(#tp-acc)"/>
    <rect x="200" y="318" width="60" height="8" rx="4" fill="#ffffff" opacity="0.5"/>
    <text x="230" y="365" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff" opacity="0.85">Televisieformats</text>
  </g>
  <!-- Pipeline funnel/dashboard -->
  <g>
    <rect x="450" y="140" width="240" height="190" rx="18" fill="#ffffff" opacity="0.96"/>
    <path d="M480 175h180l-30 40H510z" fill="url(#tp-acc)" opacity="0.9"/>
    <path d="M510 225h120l-24 36h-72z" fill="url(#tp-acc)" opacity="0.6"/>
    <path d="M534 271h72l-16 30h-40z" fill="url(#tp-acc)" opacity="0.35"/>
    <text x="570" y="365" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff" opacity="0.85">Grip op de pijplijn</text>
  </g>
  <text x="400" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">Talpa Studios · Eén commercieel fundament</text>
</svg>
