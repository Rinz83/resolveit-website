    <text x="580" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff" opacity="0.85">Exact Online</text>
  </g>
  <text x="400" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">Zyfer · Influx Exact Connector</text>
