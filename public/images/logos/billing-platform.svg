<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 265 48" role="img" aria-label="Billing Platform">
  <defs>
    <linearGradient id="bp-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6DB757"/>
      <stop offset="1" stop-color="#3E8E41"/>
    </linearGradient>
  </defs>
  <!-- Mark: invoice document with euro coin -->
  <g>
    <rect x="2" y="4" width="32" height="40" rx="6" fill="url(#bp-g)"/>
    <path d="M9 13h18M9 19h18M9 25h10" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2.4" stroke-linecap="round"/>
    <rect x="9" y="31" width="12" height="6" rx="3" fill="#ffffff" fill-opacity="0.35"/>
    <circle cx="32" cy="34" r="9.5" fill="#ffffff" stroke="#3E8E41" stroke-width="2"/>
    <text x="32" y="38.4" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#3E8E41">€</text>
  </g>
  <!-- Wordmark -->
  <text x="48" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1E2B23">Billing<tspan fill="#3E8E41"> Platform</tspan></text>
</svg>
