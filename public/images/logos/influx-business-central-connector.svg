<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 48" role="img" aria-label="Influx Business Central Connector">
  <defs>
    <linearGradient id="ibc-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6DB757"/>
      <stop offset="1" stop-color="#3E8E41"/>
    </linearGradient>
  </defs>
  <!-- Mark: two rings connected by bidirectional sync arrows -->
  <g fill="none" stroke-linecap="round">
    <circle cx="13" cy="24" r="9" stroke="url(#ibc-g)" stroke-width="4.5"/>
    <circle cx="39" cy="24" r="9" stroke="#1E2B23" stroke-opacity="0.75" stroke-width="4.5"/>
    <path d="M20 19.5h11l-3-3M32 28.5H21l3 3" stroke="#3E8E41" stroke-width="2.4" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark, stacked on two lines to keep the logo compact -->
  <text x="56" y="21" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1E2B23">Influx</text>
  <text x="56" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" font-weight="700" fill="#3E8E41">Business Central</text>
</svg>
